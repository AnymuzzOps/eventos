name: Bot Eventos Gratis Santiago

on:
  schedule:
    # Corre a las 9:00 AM y 3:00 PM hora Chile (UTC-3 → 12:00 y 18:00 UTC)
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: # Permite correr manualmente desde GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx groq

      - name: Run bot
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
